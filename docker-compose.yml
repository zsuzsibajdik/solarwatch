services:

  db:
    image: postgres:16-alpine
    container_name: solarwatch-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-solarwatch}
      POSTGRES_USER: ${POSTGRES_USER:-solarwatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solarwatch}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solarwatch-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_USERNAME: ${POSTGRES_USER:-solarwatch}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-solarwatch}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-solarwatch}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/login > /dev/null 2>&1; test $$? -ne 4"]
      interval: 10s
      timeout: 5s
      retries: 30

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solarwatch-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_BACKEND_URL: http://backend:8080
    ports:
      - "5173:5173"
volumes:
  pgdata:
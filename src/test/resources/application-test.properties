spring.application.name=solar-watch

# In-memory DB for integration tests
spring.datasource.url=jdbc:h2:mem:solarwatchtest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Dummy external API config (tests should not call external services)
openweather.api.key=test
openweather.geocoding.url=https://example.invalid
sunrise.api.url=https://example.invalid

# JWT test secrets (must be valid base64 for jjwt Keys.hmacShaKeyFor)
jwt.access-token-secret=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
jwt.refresh-token-secret=BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

